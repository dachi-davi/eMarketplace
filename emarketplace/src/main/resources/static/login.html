<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>eMarketplace - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen text-gray-800">
<nav class="bg-indigo-500 h-14 flex items-center shadow-md">
  <div class="max-w-6xl mx-auto px-4 w-full"><a href="index.html" class="text-xl font-bold text-white italic">eMarketplace</a></div>
</nav>
<div class="flex-grow flex items-center justify-center">
  <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-full max-w-sm text-center">
    <h2 class="text-2xl font-semibold mb-6">Log In</h2>
    <form id="login-form" class="space-y-4 text-left">
      <div><label class="block text-sm font-medium mb-1">Username or Email</label><input type="text" id="identifier" class="w-full border rounded-lg px-3 py-2" required></div>
      <div><label class="block text-sm font-medium mb-1">Password</label><input type="password" id="password" class="w-full border rounded-lg px-3 py-2" required></div>
      <button type="submit" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white py-2.5 rounded-lg mt-4 font-medium transition">Log In</button>
    </form>
    <p class="mt-4 text-sm">Don't have an account? <a href="register.html" class="text-indigo-600 hover:underline">Register</a></p>
  </div>
</div>
<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await fetch('http://localhost:8080/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
              identifier: document.getElementById('identifier').value,
              password: document.getElementById('password').value
          })
      });
      if(res.ok) {
          const user = await res.json();
          localStorage.setItem('user', JSON.stringify(user));
          window.location.href = 'index.html';
      } else alert(await res.text());
  });
</script>
</body>
</html>
