<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eMarketplace - Add Item</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

<nav class="bg-white border-b border-gray-100 h-16 flex items-center">
    <div class="max-w-3xl mx-auto px-4 w-full flex items-center">
        <a href="index.html" class="text-sm font-medium text-gray-500 hover:text-indigo-600 transition flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7 m0 0l7-7 m-7 7h18"></path></svg>
            Back to Dashboard
        </a>
    </div>
</nav>

<main class="max-w-2xl mx-auto px-4 py-12">
    <div class="bg-white rounded-2xl border border-gray-100 p-8 shadow-sm">
        <h1 class="text-2xl font-bold text-gray-900 tracking-tight mb-1">Create New Listing</h1>
        <p class="text-sm text-gray-500 mb-8">Fill out the form details below to broadcast your listing across the marketplace.</p>

        <form id="item-form" class="space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                <div class="sm:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Item Title</label>
                    <input type="text" name="name" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition outline-none" placeholder="e.g. Mechanical Keyboard">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Price ($)</label>
                    <input type="number" step="0.01" name="price" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition outline-none" placeholder="0.00">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Photo Upload</label>
                <div class="border-2 border-dashed border-gray-200 rounded-xl p-6 text-center hover:border-indigo-500 transition relative bg-gray-50/50">
                    <input type="file" name="photo" id="photo-input" accept="image/*" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <div id="upload-placeholder" class="space-y-2">
                        <svg class="mx-auto h-8 w-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <p class="text-sm font-medium text-gray-600" id="file-name-display">Click to upload file image</p>
                        <p class="text-xs text-gray-400">PNG, JPG, JPEG up to 5MB</p>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Item Description</label>
                <textarea name="description" rows="5" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition outline-none resize-none" placeholder="Provide complete specifications or seller contact details..."></textarea>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 rounded-xl transition duration-200 shadow-md shadow-indigo-100 flex justify-center items-center">
                Submit Listing
            </button>
        </form>
    </div>
</main>

<script>

    // Cosmetic listener to show selected file name
    document.getElementById('photo-input').addEventListener('change', (e) => {
        const fileName = e.target.files[0]?.name || "Click to upload file image";
        document.getElementById('file-name-display').innerText = fileName;
    });

    document.getElementById('item-form').addEventListener('submit', async (e) => {
        e.preventDefault();


        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) return alert("You must be logged in to post an item!");

        const formData = new FormData(e.target);

        formData.append("userId", user.id);

        try {
            const response = await fetch('http://localhost:8080/items', {
                method: 'POST',
                body: formData
            });
            if (response.ok) window.location.href = 'index.html';
        } catch (error) {
            console.error(error);
        }
    });
</script>
</body>
</html>
