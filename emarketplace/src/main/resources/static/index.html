<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eMarketplace - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-column justify-between text-gray-800">
<nav class="bg-indigo-500 h-14 flex items-center shadow-md text-white">
    <div class="max-w-6xl mx-auto px-4 w-full flex justify-between items-center">
        <a href="index.html" class="text-xl font-bold italic">eMarketplace</a>
        <div id="nav-auth" class="flex gap-4 items-center text-sm font-medium">
        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto px-4 py-8">
    <div class="flex justify-between items-end mb-6">
        <p id="total-count" class="text-sm text-gray-500">Loading...</p>
        <div class="flex items-center gap-2">
            <label class="text-sm text-gray-600">Sort by:</label>
            <select id="sort-select" class="border rounded px-2 py-1 text-sm outline-none">
                <option value="dateDesc">Date Descending</option>
                <option value="dateAsc">Date Ascending</option>
                <option value="priceAsc">Price Ascending</option>
                <option value="priceDesc">Price Descending</option>
            </select>
        </div>
    </div>

    <div id="items-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <div class="mt-8 flex justify-center gap-4">
        <button id="prev-btn" class="px-4 py-1.5 rounded bg-indigo-400 text-white disabled:opacity-50" disabled>&lt;</button>
        <span id="page-indicator" class="text-indigo-600 font-medium">1</span>
        <button id="next-btn" class="px-4 py-1.5 rounded bg-indigo-400 text-white disabled:opacity-50">&gt;</button>
    </div>
</main>

<script>
    const API_BASE = "http://localhost:8080";
    let currentPage = 0;

    // Auth Logic
    const user = JSON.parse(localStorage.getItem('user'));
    const navAuth = document.getElementById('nav-auth');
    if (user) {
        navAuth.innerHTML = `
            <a href="new-item.html" class="bg-white text-indigo-600 px-4 py-1 rounded shadow-sm hover:bg-gray-100 transition">New</a>
            <span>${user.username}</span>
            <button onclick="localStorage.removeItem('user'); location.reload();" class="hover:underline opacity-80 cursor-pointer">Logout</button>
        `;
    } else {
        navAuth.innerHTML = `<a href="login.html" class="hover:underline">Log In</a> <a href="register.html" class="bg-white text-indigo-600 px-4 py-1 rounded shadow-sm hover:bg-gray-100 transition">Register</a>`;
    }

    async function fetchItems(page) {
        const sort = document.getElementById('sort-select').value;
        const res = await fetch(`${API_BASE}/items?page=${page}&sort=${sort}`);
        const data = await res.json();

        document.getElementById('total-count').innerText = `${data.totalElements} items in total`;
        document.getElementById('items-grid').innerHTML = data.content.map(item => `
            <a href="item.html?id=${item.id}" class="block bg-white border rounded shadow-sm hover:shadow-md transition p-4">
                <img src="${item.photoUrl ? API_BASE+item.photoUrl : ''}" class="w-full h-48 object-cover mb-4">
                <h3 class="font-medium text-lg">${item.name}</h3>
                <p class="text-indigo-600 font-bold">${item.price}$</p>
            </a>
        `).join('');

        currentPage = page;
        document.getElementById('page-indicator').innerText = page + 1;
        document.getElementById('prev-btn').disabled = data.first;
        document.getElementById('next-btn').disabled = data.last;
    }

    document.getElementById('sort-select').addEventListener('change', () => fetchItems(0));
    document.getElementById('prev-btn').addEventListener('click', () => fetchItems(currentPage - 1));
    document.getElementById('next-btn').addEventListener('click', () => fetchItems(currentPage + 1));
    fetchItems(0);
</script>
</body>
</html>
